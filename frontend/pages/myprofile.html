<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="/frontend/assets/js/auth.js"></script>
  <script>
    requireAuth();
  </script>
    <link rel="stylesheet" href="/frontend/assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/frontend/assets/css/myprofile.css">
    <link rel="stylesheet" href="/frontend/assets/css/footer_navbar.css">
    <title>Modify Info</title>
</head>
<body>
    <!-- insert Navbar -->
    <div id="navbar"></div>
    <div id="profil"></div>
    <!--pop up-->
    <div class="modal fade" id="editProfileModal" tabindex="-1" aria-hidden="true">
       <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
          <div class="modal-content">
              <!-- header -->
              <div class="modal-header">
                <h5 class="modal-title" >Edit Profile</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                
              </div>
              <!--body-->
              <div class="modal-body">
               
                <div class="modal-avatar-row">
                  <div class="modal-avatar">
                    <img src="/frontend/assets/images/icon-7797704_1280.png" class="profile-pic" > 
                    <div class="avatar-edit-btn" title="Change photo" onclick="document.getElementById('avatarUpload').click()">
       <input type="file" id="avatarUpload" style="display:none" accept="image/*" onchange="uploadAvatarImage(event)">
                      <i class="bi bi-camera-fill"></i>
                    </div>
                  </div>
                  <div class="modal-avatar-info">
                    <div class="name">Name</div>
                  </div>
                </div>
                <div class="row g-3">
                  <div class="col-6">
                    <label class="form-label">First Name</label>
                    <input type="text" id="firstName" class="form-control" placeholder="First name"/>
                  </div>
                  <div class="col-6">
                    <label class="form-label">Last Name</label>
                    <input type="text" id="lastName" class="form-control" placeholder="Last name"/>
                  </div>
                  <div class="col-12 mt-3">
        <label class="form-label">Title / Tagline</label>
        <input type="text" id="editTagline" class="form-control" placeholder="Software Engineer at INSAT" />
     </div>
     <div class="col-12 mt-3">
        <label class="form-label">Personal Link</label>
        <input type="text" id="editProfileLink" class="form-control" placeholder="Link to Facebook, LinkedIn, GitHub..." />
     </div>
                  <div class="col-6">
                    <label class="form-label">ID INSAT</label>
                    <input type="text" class="form-control" value="2500123" placeholder="Your id"/>
                  </div>
                  <div class="col-6">
                    <label class="form-label">Promo</label>
                    <input type="text" id="promoYear" class="form-control" placeholder="Promo (e.g. 2028)"/>
                  </div>
                  <div class="col-12">
                    <label class="form-label">Bio</label>
                    <textarea id="editBio" class="form-control" placeholder="Bio..." rows="4"></textarea>
                  </div>
                </div>
                <!-- Projects -->
              <div class="form-group mt-3">
                  <label><i class="bi bi-folder"></i> Projects</label>
                  <div id="projects-list">
                    <div class="input-group mb-2">
                      <input type="text" class="form-control" placeholder="Project's Name">
                      <input type="text" class="form-control" placeholder="Description">
                    </div>
                  </div>
                  <button type="button" class="btn-add" onclick="addProject()">+ Add a project</button>
                </div>
                <!-- Jobs -->
                <div class="form-group mt-3">
                  <label><i class="bi bi-briefcase"></i> Jobs</label>
                  <div id="jobs-list">
                    <div class="input-group mb-2">
                      <input type="text" class="form-control" placeholder="Title">
                      <input type="text" class="form-control" placeholder="Entreprise">
                    </div>
                  </div>
                  <button type="button" class="btn-add" onclick="addJob()">+ Add a job</button>
                </div>
                <!-- Skills -->
                <div class="form-group mt-3">
                  <label><i class="bi bi-bag-check"></i> Skills</label>
                  <div id="skills-list">
                    <div class="input-group mb-2">
                      <input type="text" class="form-control" placeholder="Skills and certifications">
                    </div>
                  </div>
                  <button type="button" class="btn-add" onclick="addSkill()">+ Add a skill</button>
                </div>
                <!-- Achievements -->
                <div class="form-group mt-3">
                  <label><i class="bi bi-award"></i> Achievements</label>
                  <div id="achievements-list">
                    <div class="input-group mb-2">
                      <input type="text" class="form-control" placeholder="Achievement">
                      <input type="text" class="form-control" placeholder="Description">
                    </div>
                  </div>
                  <button type="button" class="btn-add" onclick="addAchievement()">+ Add an achievement</button>
                </div>
              </div>
              <!-- Footer -->
              <div class="modal-footer">
                <button type="button" class="btn btn-secondary" id="cancelBtn">  Exit </button>
                <button type="button"  class="btn btn-success" id="saveBtn" onclick="saveProfile()">Save</button>
              </div>

          </div>
       </div>
    </div>

    <div class="footer" id="footer"></div>

    <script>
      function closeEditModal() {
        const modalEl = document.getElementById("editProfileModal");
        if (!modalEl) return;

        modalEl.style.display = "none";
        modalEl.classList.remove("show");
        document.body.classList.remove("modal-open");

        // Reset inline styles Bootstrap modal interactions can leave behind.
        document.body.style.removeProperty("overflow");
        document.body.style.removeProperty("padding-right");

        document.querySelectorAll(".modal-backdrop").forEach(function(backdrop) {
          backdrop.remove();
        });
      }

      function loadProfileSection(file) {
        fetch(file)
          .then(res => res.text())
          .then(data => {
            document.getElementById("profil").innerHTML = data;
            const btn = document.getElementById("editBtn");
            if (btn) {
              btn.classList.remove("invisible");
              btn.addEventListener("click", function() {
                const modalEl = document.getElementById("editProfileModal");
                modalEl.style.display = "block";
                modalEl.classList.add("show");
                document.body.classList.add("modal-open");

                if (!document.querySelector(".modal-backdrop")) {
                  const backdrop = document.createElement("div");
                  backdrop.className = "modal-backdrop fade show";
                  document.body.appendChild(backdrop);
                }
              });
            }

            const closeBtn = document.querySelector("#editProfileModal .btn-close");
            if (closeBtn) {
              closeBtn.addEventListener("click", closeEditModal);
            }

            const cancelBtn = document.getElementById("cancelBtn");
            if (cancelBtn) {
              cancelBtn.addEventListener("click", closeEditModal);
            }

            // Fetch our own profile to populate visually
            authApiFetch('/profile/me')
              .then(res => res.json())
              .then(resData => {
                if (resData.ok && resData.data) {
                  const user = resData.data;

                  // Hide recommend button
                  const recBtn = document.querySelector('[data-bs-target="#recommendModal"]');
                  if(recBtn) {"none"===recBtn.style.display; recBtn.style.display="none";}
                    const addPostBtn = document.getElementById('addPostBtn');
                    if(addPostBtn) addPostBtn.style.display = 'block';
                  const nom = document.querySelector('.nom');
                  if(nom) nom.textContent = `${user.firstName} ${user.lastName}`;
                  
                  const info = document.querySelector('.info-body .info-text');
                  if(info) info.textContent = user.bio || "No bio provided.";
                  
                  const nomEls = document.querySelectorAll('.num-id');
                  if(nomEls.length > 0) nomEls[0].textContent = user.insatienId || "N/A";
                  if (nomEls.length > 1) nomEls[1].textContent = user.promoYear || "N/A";

                  if (user.avatarUrl) {
                      const profilePic = document.querySelector('.profile-pic');
                      if(profilePic) profilePic.src = user.avatarUrl;
                      const modalPic = document.querySelector('.modal-avatar .profile-pic');
                      if(modalPic) modalPic.src = user.avatarUrl;
                  }

                                    if (user.profileLink) {
                      const linkList = document.querySelector('.infoo ul:last-of-type');
                      if (linkList) {
                          linkList.innerHTML = '';
                          const uLink = user.profileLink.toLowerCase();
                          let linkType = 'Website';
                          let iconClass = 'fa-solid fa-link';
                          if (uLink.includes('facebook')) { linkType = 'Facebook'; iconClass = 'fa-brands fa-facebook'; }
                          else if (uLink.includes('linkedin')) { linkType = 'LinkedIn'; iconClass = 'fa-brands fa-linkedin'; }
                          else if (uLink.includes('github')) { linkType = 'GitHub'; iconClass = 'fa-brands fa-github'; }
                          else if (uLink.includes('instagram')) { linkType = 'Instagram'; iconClass = 'fa-brands fa-instagram'; }
                          
                          linkList.innerHTML = `<li class="liste-lien" style="margin-top:10px;"><i class="${iconClass} fa-lg" style="margin-right:10px; color:#555;"></i> <a href="${user.profileLink}" class="liens" target="_blank" style="text-decoration:none;">${linkType}</a></li>`;
                      }
                  }
                  const skillsPart = document.querySelector('.skills-part2');
                  if (skillsPart) {
                      skillsPart.innerHTML = '';
                      if (user.skills && user.skills.length > 0) {
                          user.skills.forEach(skill => {
                              skillsPart.insertAdjacentHTML('beforeend', `<span class="badge skill-badge" style="background-color: var(--secondary-color); color: white; padding: 5px 10px; border-radius: 5px; margin-right:5px;">${skill}</span>`);
                          });
                      } else {
                          skillsPart.innerHTML = '<p class="text-muted">No skills added yet.</p>';
                      }
                  }
                    const postsContainer = document.getElementById('postsContainer');
                    if (postsContainer) {
                        postsContainer.innerHTML = '';
                        if (user.posts && user.posts.length > 0) {
                            user.posts.forEach(post => {
                                const postHtml = `
                                    <div class="card mb-2" style="border-radius:10px;">
                                        <div class="card-body">
                                            <h6 class="card-subtitle mb-2 text-muted" style="font-size:0.8rem;">
                                              ${new Date(post.createdAt).toLocaleDateString()}
                                            </h6>
                                            <p class="card-text">${post.content}</p>
                                        </div>
                                    </div>
                                `;
                                postsContainer.insertAdjacentHTML('beforeend', postHtml);
                            });
                        } else {
                            postsContainer.innerHTML = '<p class="text-muted" style="padding: 10px; font-style: italic;">No posts yet.</p>';
                        }
                    }
                  const recContainer = document.getElementById('recommendationsContainer');
                  if (recContainer) {
                      recContainer.innerHTML = '';
                      if (user.recommendations && user.recommendations.length > 0) {
                          user.recommendations.forEach(rec => {
                              const recHtml = `
                                  <div class="review-card">
                                    <div class="review-header">
                                      <img src="${rec.author.avatarUrl || 'https://i.pravatar.cc/100?img=' + rec.author.id}" style="width: 50px; height: 50px; border-radius: 50%; object-fit: cover;">
                                        <div class="review-name" style="font-weight: bold; margin-left: 10px;">${rec.author.firstName} ${rec.author.lastName}</div>
                                    </div>
                                    <div class="review-text" style="margin-top: 10px; color: #555;">${rec.text}</div>
                                  </div>
                              `;
                              recContainer.insertAdjacentHTML('beforeend', recHtml);
                          });
                      } else {
                          recContainer.innerHTML = '<p class="text-muted" style="padding: 10px; font-style: italic;">No recommendations yet.</p>';
                      }
                  }

                  // Pre-fill Edit Modal Fields
                  const fName = document.getElementById('firstName');
                  if(fName) fName.value = user.firstName || '';
                  const lName = document.getElementById('lastName');
                  if(lName) lName.value = user.lastName || '';
                  const eBio = document.getElementById('editBio');
    if(eBio) eBio.value = user.bio || '';
    const ePromo = document.getElementById('promoYear');
    if(ePromo) ePromo.value = user.promoYear || '';
    const eLink = document.getElementById('editProfileLink');
    if(eLink) eLink.value = user.profileLink || '';
    const eTagline = document.getElementById('editTagline');
    if(eTagline) eTagline.value = user.tagline || '';
                  
                  const skillsList = document.getElementById('skills-list');
                  if (skillsList) {
                      skillsList.innerHTML = '';
                      if(user.skills) {
                          user.skills.forEach(skill => {
                              skillsList.insertAdjacentHTML('beforeend', `
                                  <div class="input-group mb-2">
                                      <input type="text" class="form-control" value="${skill}">
                                      <button type="button" class="btn btn-outline-danger" onclick="this.parentElement.remove()">Ã—</button>
                                  </div>
                              `);
                          });
                      }
                  }
                }
              })
              .catch(console.error);
          })
          .catch(err => console.error("Error loading:", file, err));
      }
      loadProfileSection("../pages/profil.html");

    document.addEventListener("click", function(e) {
      if (e.target.classList && e.target.classList.contains("modal-backdrop")) {
        closeEditModal();
      }
    });
//fucntions
            async function uploadAvatarImage(event) {
        const file = event.target.files[0];
        if (!file) return;

        const formData = new FormData();
        formData.append("avatar", file);

        try {
          const res = await authApiFetch('/profile/avatar', {
            method: 'POST',
            body: formData
          });
          const data = await res.json();
          if (data.ok && data.data && data.data.avatarUrl) {
            document.querySelector('.profile-pic').src = data.data.avatarUrl;
            document.querySelector('.modal-avatar .profile-pic').src = data.data.avatarUrl;
            alert("Photo upated! Save profile to finish.");
          } else {
            alert("Upload failed: " + (data.message || "Unknown error"));
          }
        } catch(e) {
          console.error(e);
          alert("Network error: Upload failed.");
        }
      }

      function addProject() {
        const div = document.createElement("div");
        div.className = "input-group mb-2";
        div.innerHTML = `
          <input type="text" class="form-control" placeholder="Project's Name">
          <input type="text" class="form-control" placeholder="Description">
          <button type="button" class="btn btn-outline-danger" onclick="this.parentElement.remove()">Ã—</button>
        `;
        document.getElementById("projects-list").appendChild(div);
      }

      function addJob() {
        const div = document.createElement("div");
        div.className = "input-group mb-2";
        div.innerHTML = `
          <input type="text" class="form-control" placeholder="Title">
          <input type="text" class="form-control" placeholder="Entreprise">
          <button type="button" class="btn btn-outline-danger" onclick="this.parentElement.remove()">Ã—</button>
        `;
        document.getElementById("jobs-list").appendChild(div);
      }

      function addSkill() {
        const div = document.createElement("div");
        div.className = "input-group mb-2";
        div.innerHTML = `
          <input type="text" class="form-control" placeholder="Skills and certifications">
          <button type="button" class="btn btn-outline-danger" onclick="this.parentElement.remove()">Ã—</button>
        `;
        document.getElementById("skills-list").appendChild(div);
      }

      function addAchievement() {
        const div = document.createElement("div");
        div.className = "input-group mb-2";
        div.innerHTML = `
          <input type="text" class="form-control" placeholder="Achievement">
          <input type="text" class="form-control" placeholder="Description">
          <button type="button" class="btn btn-outline-danger" onclick="this.parentElement.remove()">Ã—</button>
        `;
        document.getElementById("achievements-list").appendChild(div);
      }

      async function saveProfile() {
        const btn = document.getElementById("saveBtn");
        btn.disabled = true;
        btn.innerText = "Saving...";

        const payload = {
          firstName: document.getElementById("firstName") ? document.getElementById("firstName").value : "",
          lastName: document.getElementById("lastName") ? document.getElementById("lastName").value : "",
          bio: document.getElementById('editBio') ? document.getElementById('editBio').value : '',
    promoYear: document.getElementById('promoYear') ? document.getElementById('promoYear').value : null,
    profileLink: document.getElementById('editProfileLink') ? document.getElementById('editProfileLink').value : '',
    tagline: document.getElementById('editTagline') ? document.getElementById('editTagline').value : '',
          skills: []
        };

        const skillInputs = document.querySelectorAll("#skills-list input.form-control");
        skillInputs.forEach(i => {
           if(i.value.trim()) payload.skills.push(i.value.trim());
        });

        try {
          const res = await authApiFetch('/profile/me', {
            method: 'PUT',
            body: JSON.stringify(payload)
          });
          const data = await res.json();
          if (data.ok) {
            closeEditModal();
            window.location.reload();
            return;
          }
          alert("Update failed: " + (data.message || "Unknown error"));
        } catch (e) {
          console.error(e);
          alert("Network error.");
        } finally {
          btn.disabled = false;
          btn.innerText = "Save";
        }
      }
    </script>

  <!-- Post Modal -->
  <div class="modal fade" id="postModal" tabindex="-1" aria-labelledby="postModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="postModalLabel">Create a Post</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <textarea id="postContentInput" class="form-control" rows="4" placeholder="What do you want to share?"></textarea>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-primary" onclick="submitUserProfilePost()">Post</button>
        </div>
      </div>
    </div>
  </div>





<script>
async function submitUserProfilePost() {
    const text = document.getElementById('postContentInput').value.trim();
    if (!text) {
        alert('Please write something first.');
        return;
    }
    try {
        const response = await authApiFetch('/posts', {
            method: 'POST',
            body: JSON.stringify({ content: text })
        });
        const data = await response.json();
        if (data.ok) {
            document.getElementById('postContentInput').value = '';
            const myModal = bootstrap.Modal.getInstance(document.getElementById('postModal'));
            if (myModal) myModal.hide();
            window.location.reload();
        } else {
            alert('Failed to create post: ' + data.message);
        }
    } catch (error) {
        console.error('Failed to submit post', error);
        alert('Network error.');
    }
}
</script>
</body>
<script src="/frontend/assets/js/bootstrap.bundle.min.js"></script>
<script src="/frontend/assets/js/root.js"></script>
<script>
    loadComponent("navbar", "/frontend/components/navbar.html", function() {
        initTheme();
        setActiveNav();
    });
    loadComponent("footer", "/frontend/components/footer.html");
</script>
</html>
