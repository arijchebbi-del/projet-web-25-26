<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="/frontend/assets/js/auth.js"></script>
  <script>
    requireAuth();
  </script>
    <link rel="stylesheet" href="/frontend/assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/frontend/assets/css/myprofile.css">
    <link rel="stylesheet" href="/frontend/assets/css/footer_navbar.css">
    <title>Modify Info</title>
</head>
<body>
    <!-- insert Navbar -->
    <div id="navbar"></div>
    <div id="profil"></div>
    <!--pop up-->
    <div class="modal fade" id="editProfileModal" tabindex="-1" aria-hidden="true">
       <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
          <div class="modal-content">
              <!-- header -->
              <div class="modal-header">
                <h5 class="modal-title" >Edit Profile</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                
              </div>
              <!--body-->
              <div class="modal-body">
               
                <div class="modal-avatar-row">
                  <div class="modal-avatar">
                    <img src="/frontend/assets/images/icon-7797704_1280.png" class="profile-pic" > 
                    <div class="avatar-edit-btn" title="Change photo">
                      <i class="bi bi-camera-fill"></i>
                    </div>
                  </div>
                  <div class="modal-avatar-info">
                    <div class="name">Name</div>
                  </div>
                </div>
                <div class="row g-3">
                  <div class="col-6">
                    <label class="form-label">First Name</label>
                    <input type="text" id="firstName" class="form-control" placeholder="First name"/>
                  </div>
                  <div class="col-6">
                    <label class="form-label">Last Name</label>
                    <input type="text" id="lastName" class="form-control" placeholder="Last name"/>
                  </div>
                  <div class="col-12 mt-3">
                    <label class="form-label">Bio / Tagline</label>
                    <input type="text" id="editBio" class="form-control" placeholder="Software Engineer at INSAT" />
                  </div>
                  <div class="col-6">
                    <label class="form-label">ID INSAT</label>
                    <input type="text" class="form-control" value="2500123" placeholder="Your id"/>
                  </div>
                  <div class="col-6">
                    <label class="form-label">Promo</label>
                    <input type="text" class="form-control" value="2028" placeholder="Promo"/>
                  </div>
                  <div class="col-12">
                    <label class="form-label">Bio</label>
                    <textarea class="form-control" placeholder="Bio..." rows="4">Hi! I'm a passionate developer who loves building modern and creative web applications.</textarea>
                  </div>
                </div>
                <!-- Projects -->
              <div class="form-group mt-3">
                  <label><i class="bi bi-folder"></i> Projects</label>
                  <div id="projects-list">
                    <div class="input-group mb-2">
                      <input type="text" class="form-control" placeholder="Project's Name">
                      <input type="text" class="form-control" placeholder="Description">
                    </div>
                  </div>
                  <button type="button" class="btn-add" onclick="addProject()">+ Add a project</button>
                </div>
                <!-- Jobs -->
                <div class="form-group mt-3">
                  <label><i class="bi bi-briefcase"></i> Jobs</label>
                  <div id="jobs-list">
                    <div class="input-group mb-2">
                      <input type="text" class="form-control" placeholder="Title">
                      <input type="text" class="form-control" placeholder="Entreprise">
                    </div>
                  </div>
                  <button type="button" class="btn-add" onclick="addJob()">+ Add a job</button>
                </div>
                <!-- Skills -->
                <div class="form-group mt-3">
                  <label><i class="bi bi-bag-check"></i> Skills</label>
                  <div id="skills-list">
                    <div class="input-group mb-2">
                      <input type="text" class="form-control" placeholder="Skills and certifications">
                    </div>
                  </div>
                  <button type="button" class="btn-add" onclick="addSkill()">+ Add a skill</button>
                </div>
                <!-- Achievements -->
                <div class="form-group mt-3">
                  <label><i class="bi bi-award"></i> Achievements</label>
                  <div id="achievements-list">
                    <div class="input-group mb-2">
                      <input type="text" class="form-control" placeholder="Achievement">
                      <input type="text" class="form-control" placeholder="Description">
                    </div>
                  </div>
                  <button type="button" class="btn-add" onclick="addAchievement()">+ Add an achievement</button>
                </div>
              </div>
              <!-- Footer -->
              <div class="modal-footer">
                <button type="button" class="btn btn-secondary" id="cancelBtn">  Exit </button>
                <button type="button"  class="btn btn-success" id="saveBtn" onclick="saveProfile()">Save</button>
              </div>

          </div>
       </div>
    </div>

    <div class="footer" id="footer"></div>

    <script>
      function closeEditModal() {
        const modalEl = document.getElementById("editProfileModal");
        if (!modalEl) return;

        modalEl.style.display = "none";
        modalEl.classList.remove("show");
        document.body.classList.remove("modal-open");

        // Reset inline styles Bootstrap modal interactions can leave behind.
        document.body.style.removeProperty("overflow");
        document.body.style.removeProperty("padding-right");

        document.querySelectorAll(".modal-backdrop").forEach(function(backdrop) {
          backdrop.remove();
        });
      }

      function loadProfileSection(file) {
        fetch(file)
          .then(res => res.text())
          .then(data => {
            document.getElementById("profil").innerHTML = data;
            const btn = document.getElementById("editBtn");
            if (btn) {
              btn.classList.remove("invisible");
              btn.addEventListener("click", function() {
                const modalEl = document.getElementById("editProfileModal");
                modalEl.style.display = "block";
                modalEl.classList.add("show");
                document.body.classList.add("modal-open");

                if (!document.querySelector(".modal-backdrop")) {
                  const backdrop = document.createElement("div");
                  backdrop.className = "modal-backdrop fade show";
                  document.body.appendChild(backdrop);
                }
              });
            }

            const closeBtn = document.querySelector("#editProfileModal .btn-close");
            if (closeBtn) {
              closeBtn.addEventListener("click", closeEditModal);
            }

            const cancelBtn = document.getElementById("cancelBtn");
            if (cancelBtn) {
              cancelBtn.addEventListener("click", closeEditModal);
            }
          })
          .catch(err => console.error("Error loading:", file, err));
      }
      loadProfileSection("../pages/profil.html");

    document.addEventListener("click", function(e) {
      if (e.target.classList && e.target.classList.contains("modal-backdrop")) {
        closeEditModal();
      }
    });
//fucntions
      function addProject() {
        const div = document.createElement("div");
        div.className = "input-group mb-2";
        div.innerHTML = `
          <input type="text" class="form-control" placeholder="Project's Name">
          <input type="text" class="form-control" placeholder="Description">
          <button type="button" class="btn btn-outline-danger" onclick="this.parentElement.remove()">×</button>
        `;
        document.getElementById("projects-list").appendChild(div);
      }

      function addJob() {
        const div = document.createElement("div");
        div.className = "input-group mb-2";
        div.innerHTML = `
          <input type="text" class="form-control" placeholder="Title">
          <input type="text" class="form-control" placeholder="Entreprise">
          <button type="button" class="btn btn-outline-danger" onclick="this.parentElement.remove()">×</button>
        `;
        document.getElementById("jobs-list").appendChild(div);
      }

      function addSkill() {
        const div = document.createElement("div");
        div.className = "input-group mb-2";
        div.innerHTML = `
          <input type="text" class="form-control" placeholder="Skills and certifications">
          <button type="button" class="btn btn-outline-danger" onclick="this.parentElement.remove()">×</button>
        `;
        document.getElementById("skills-list").appendChild(div);
      }

      function addAchievement() {
        const div = document.createElement("div");
        div.className = "input-group mb-2";
        div.innerHTML = `
          <input type="text" class="form-control" placeholder="Achievement">
          <input type="text" class="form-control" placeholder="Description">
          <button type="button" class="btn btn-outline-danger" onclick="this.parentElement.remove()">×</button>
        `;
        document.getElementById("achievements-list").appendChild(div);
      }

      async function saveProfile() {
        const btn = document.getElementById("saveBtn");
        btn.disabled = true;
        btn.innerText = "Saving...";

        const payload = {
          firstName: document.getElementById("firstName") ? document.getElementById("firstName").value : "",
          lastName: document.getElementById("lastName") ? document.getElementById("lastName").value : "",
          bio: document.getElementById("editBio") ? document.getElementById("editBio").value : "",
          skills: []
        };

        const skillInputs = document.querySelectorAll("#skills-list input.form-control");
        skillInputs.forEach(i => {
           if(i.value.trim()) payload.skills.push(i.value.trim());
        });

        try {
          const res = await authApiFetch('/profile/me', {
            method: 'PUT',
            body: JSON.stringify(payload)
          });
          const data = await res.json();
          if (data.ok) {
            closeEditModal();
            window.location.reload();
            return;
          }
          alert("Update failed: " + (data.message || "Unknown error"));
        } catch (e) {
          console.error(e);
          alert("Network error.");
        } finally {
          btn.disabled = false;
          btn.innerText = "Save";
        }
      }
    </script>
</body>
<script src="/frontend/assets/js/bootstrap.bundle.min.js"></script>
<script src="/frontend/assets/js/root.js"></script>
<script>
    loadComponent("navbar", "/frontend/components/navbar.html", function() {
        initTheme();
        setActiveNav();
    });
    loadComponent("footer", "/frontend/components/footer.html");
</script>
</html>
