<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="/frontend/assets/js/auth.js"></script>
    <script>
        requireAuth();
    </script>
    <title>Alumini | Research</title>

    <link rel="stylesheet" href="/frontend/assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css">
    <link rel="stylesheet" href="/frontend/assets/css/recherche.css">
    <link rel="stylesheet" href="/frontend/assets/css/footer_navbar.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>


<body>
    <div id="navbar"></div>
    <div class="container mt-4">
        <form id="researchForm">
            <div class="row justify-content-center align-items-center g-2">

                <div class="col-12 col-md-6 col-lg-7">
                    <input type="text" id="search_keyword" class="form-control" placeholder="Enter keywords or research title…">
                </div>

                <div class="col-12 col-md-6 col-lg-2">
                    <select class="form-select w-100" id="filter_dropdown">
                        <option value="">Filter By</option>
                        <option value="promo">Promo</option>
                        <option value="skills">Skills</option>
                        <option value="filiere">Filiere</option>
                        <option value="parcours">Parcours</option>
                    </select>
                </div>

                <div class="col-12 col-md-6 col-lg-2">
                    <input type="text" id="filter_value" class="form-control" placeholder="Filter value">
                </div>

                <div class="col-6 col-md-3 col-lg-1">
                    <button type="submit" class="btn btn-light w-100" id="search_button">Search</button>
                </div>

            </div>
        </form>

        <div class="row justify-content-center mt-4">
            <div class="col-sm-12">
                <div class="bg-white p-3 rounded shadow">
                    <table id="usersTable" class="table table-striped table-bordered align-middle w-100">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Promo</th>
                                <th>Filiere</th>
                                <th>Parcours</th>
                                <th>Skills</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="footer"></div>

</body>
<script src="/frontend/assets/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>
<script src="/frontend/assets/js/root.js"></script>
<script src="../assets/js/recherche.js"></script>
<script>
    loadComponent("navbar", "/frontend/components/navbar.html", function() {
        initTheme();
        setActiveNav();
    });
    loadComponent("footer", "/frontend/components/footer.html");
    initResearchPage();
</script>
</html>
